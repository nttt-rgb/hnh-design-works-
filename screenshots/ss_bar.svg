<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="NOCTURNE BAR · CAFE sample">
  <defs>
    <linearGradient id="bg-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#050A14"/>
    </linearGradient>
    <radialGradient id="glow-glass" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg-glass)"/>
  <rect width="640" height="400" fill="url(#glow-glass)"/>

  <!-- Decorative frame -->
  <rect x="24" y="24" width="592" height="352" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.35"/>

  <!-- Motif (right) -->
  
    <g stroke="#D4AF37" stroke-width="4" fill="none" opacity="0.95">
      <path d="M 410 130 L 570 130 L 490 230 Z" fill="#D4AF37" fill-opacity="0.25"/>
      <line x1="490" y1="230" x2="490" y2="310"/>
      <line x1="455" y1="310" x2="525" y2="310"/>
    </g>
    <circle cx="460" cy="160" r="8" fill="#D4AF37" opacity="0.7"/>
  

  <!-- Text: industry label (top-left) -->
  <text x="52" y="82" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#D4AF37">B A R   ·   C A F E</text>
  <line x1="52" y1="96" x2="96" y2="96" stroke="#D4AF37" stroke-width="1.5" opacity="0.85"/>

  <!-- Text: brand name (large) -->
  <text x="52" y="163" font-family="'Inter', -apple-system, sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#F4E9CF">NOCTURNE</text>

  <!-- Text: brand sub -->
  <text x="52" y="200" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="400" letter-spacing="2" fill="#8B9AAD">BAR · NISHIAZABU</text>

  <!-- Text: tagline (italic serif) -->
  <text x="52" y="268" font-family="'Cormorant Garamond', 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="20" font-style="italic" font-weight="400" fill="#F4E9CF" opacity="0.88">Silence, to pour you a drink.</text>

  <!-- Footer: HNH credit -->
  <text x="52" y="352" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#8B9AAD" opacity="0.55">H N H  D E S I G N  W O R K S</text>
</svg>