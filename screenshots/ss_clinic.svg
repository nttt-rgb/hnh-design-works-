<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="LUMEN COSMETIC CLINIC sample">
  <defs>
    <linearGradient id="bg-cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#CFDFEF"/>
    </linearGradient>
    <radialGradient id="glow-cross" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#3B6EA5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B6EA5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg-cross)"/>
  <rect width="640" height="400" fill="url(#glow-cross)"/>

  <!-- Decorative frame -->
  <rect x="24" y="24" width="592" height="352" fill="none" stroke="#3B6EA5" stroke-width="1" opacity="0.35"/>

  <!-- Motif (right) -->
  
    <circle cx="490" cy="200" r="92" fill="none" stroke="#3B6EA5" stroke-width="3" opacity="0.45"/>
    <circle cx="490" cy="200" r="74" fill="#3B6EA5" fill-opacity="0.08"/>
    <g fill="#3B6EA5">
      <rect x="472" y="142" width="36" height="116" rx="4"/>
      <rect x="432" y="182" width="116" height="36" rx="4"/>
    </g>
  

  <!-- Text: industry label (top-left) -->
  <text x="52" y="82" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#3B6EA5">C O S M E T I C   C L I N I C</text>
  <line x1="52" y1="96" x2="96" y2="96" stroke="#3B6EA5" stroke-width="1.5" opacity="0.85"/>

  <!-- Text: brand name (large) -->
  <text x="52" y="166" font-family="'Inter', -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-1" fill="#0F2540">LUMEN</text>

  <!-- Text: brand sub -->
  <text x="52" y="200" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="400" letter-spacing="2" fill="#6A7E94">CLINIC · OMOTESANDO</text>

  <!-- Text: tagline (italic serif) -->
  <text x="52" y="268" font-family="'Cormorant Garamond', 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="20" font-style="italic" font-weight="400" fill="#0F2540" opacity="0.88">Precision &amp; aesthetic.</text>

  <!-- Footer: HNH credit -->
  <text x="52" y="352" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#6A7E94" opacity="0.55">H N H  D E S I G N  W O R K S</text>
</svg>