<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="SENTINEL LAW OFFICE sample">
  <defs>
    <linearGradient id="bg-scales" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2540"/>
      <stop offset="100%" stop-color="#081629"/>
    </linearGradient>
    <radialGradient id="glow-scales" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#C9A876" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A876" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg-scales)"/>
  <rect width="640" height="400" fill="url(#glow-scales)"/>

  <!-- Decorative frame -->
  <rect x="24" y="24" width="592" height="352" fill="none" stroke="#C9A876" stroke-width="1" opacity="0.35"/>

  <!-- Motif (right) -->
  
    <g stroke="#C9A876" stroke-width="4" fill="none" opacity="0.95">
      <!-- 支柱 -->
      <line x1="490" y1="100" x2="490" y2="280"/>
      <!-- 横バー -->
      <line x1="400" y1="120" x2="580" y2="120"/>
      <!-- 左吊り紐 -->
      <line x1="410" y1="120" x2="410" y2="180"/>
      <line x1="410" y1="120" x2="430" y2="180"/>
      <!-- 右吊り紐 -->
      <line x1="570" y1="120" x2="550" y2="180"/>
      <line x1="570" y1="120" x2="590" y2="180"/>
    </g>
    <!-- 左皿 -->
    <path d="M 386 180 Q 420 210 454 180" stroke="#C9A876" stroke-width="4" fill="#C9A876" fill-opacity="0.25"/>
    <!-- 右皿 -->
    <path d="M 526 180 Q 560 210 594 180" stroke="#C9A876" stroke-width="4" fill="#C9A876" fill-opacity="0.25"/>
    <!-- 基台 -->
    <polygon points="440,280 540,280 520,295 460,295" fill="#C9A876"/>
    <!-- 支柱上の装飾 -->
    <circle cx="490" cy="100" r="6" fill="#C9A876"/>
  

  <!-- Text: industry label (top-left) -->
  <text x="52" y="82" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#C9A876">L A W   O F F I C E</text>
  <line x1="52" y1="96" x2="96" y2="96" stroke="#C9A876" stroke-width="1.5" opacity="0.85"/>

  <!-- Text: brand name (large) -->
  <text x="52" y="163" font-family="'Inter', -apple-system, sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#FFFFFF">SENTINEL</text>

  <!-- Text: brand sub -->
  <text x="52" y="200" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="400" letter-spacing="2" fill="#8A98AD">LAW · MARUNOUCHI</text>

  <!-- Text: tagline (italic serif) -->
  <text x="52" y="268" font-family="'Cormorant Garamond', 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="20" font-style="italic" font-weight="400" fill="#FFFFFF" opacity="0.88">信頼を、形にする。</text>

  <!-- Footer: HNH credit -->
  <text x="52" y="352" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#8A98AD" opacity="0.55">H N H  D E S I G N  W O R K S</text>
</svg>