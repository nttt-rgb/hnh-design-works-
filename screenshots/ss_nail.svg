<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AETHER NAIL SALON sample">
  <defs>
    <linearGradient id="bg-flower" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE8EC"/>
      <stop offset="100%" stop-color="#F8C8D1"/>
    </linearGradient>
    <radialGradient id="glow-flower" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#C44569" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C44569" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg-flower)"/>
  <rect width="640" height="400" fill="url(#glow-flower)"/>

  <!-- Decorative frame -->
  <rect x="24" y="24" width="592" height="352" fill="none" stroke="#C44569" stroke-width="1" opacity="0.35"/>

  <!-- Motif (right) -->
  
    
    <ellipse cx="490.0" cy="160.0" rx="36" ry="52" transform="rotate(0 490.0 160.0)" fill="#C44569" fill-opacity="0.55"/>
    <ellipse cx="528.0" cy="187.6" rx="36" ry="52" transform="rotate(72 528.0 187.6)" fill="#C44569" fill-opacity="0.55"/>
    <ellipse cx="513.5" cy="232.4" rx="36" ry="52" transform="rotate(144 513.5 232.4)" fill="#C44569" fill-opacity="0.55"/>
    <ellipse cx="466.5" cy="232.4" rx="36" ry="52" transform="rotate(216 466.5 232.4)" fill="#C44569" fill-opacity="0.55"/>
    <ellipse cx="452.0" cy="187.6" rx="36" ry="52" transform="rotate(288 452.0 187.6)" fill="#C44569" fill-opacity="0.55"/>
    <circle cx="490" cy="200" r="26" fill="#E5B769"/>
    <circle cx="490" cy="200" r="12" fill="#C44569"/>
  

  <!-- Text: industry label (top-left) -->
  <text x="52" y="82" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#C44569">N A I L   S A L O N</text>
  <line x1="52" y1="96" x2="96" y2="96" stroke="#C44569" stroke-width="1.5" opacity="0.85"/>

  <!-- Text: brand name (large) -->
  <text x="52" y="166" font-family="'Inter', -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-1" fill="#4A2A35">AETHER</text>

  <!-- Text: brand sub -->
  <text x="52" y="200" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="400" letter-spacing="2" fill="#8A6570">NAIL · MINAMI-AOYAMA</text>

  <!-- Text: tagline (italic serif) -->
  <text x="52" y="268" font-family="'Cormorant Garamond', 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="20" font-style="italic" font-weight="400" fill="#4A2A35" opacity="0.88">Quiet craft.</text>

  <!-- Footer: HNH credit -->
  <text x="52" y="352" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#8A6570" opacity="0.55">H N H  D E S I G N  W O R K S</text>
</svg>